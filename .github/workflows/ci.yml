name: CI - API Tests + Allure Report

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Dar permissão ao mvnw
        run: chmod +x mvnw

      - name: Rodar testes
        run: ./mvnw clean test

      # 👇 AQUI ESTÁ O SEGREDO DO TREND
      - name: Baixar histórico anterior
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Copiar histórico para nova execução
        run: |
          mkdir -p target/allure-results/history
          if [ -d gh-pages/history ]; then
            cp -r gh-pages/history target/allure-results/
          fi

      - name: Gerar relatório Allure
        run: ./mvnw allure:report

      - name: Deploy Allure com histórico
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/site/allure-maven-plugin
          keep_files: true
